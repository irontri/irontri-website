<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>irontri — My Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{--blue:#1E90FF;--blue-dark:#1478d4;--bg:#0a0a0a;--surface:rgba(255,255,255,0.05);--border:rgba(255,255,255,0.1);--text:#fff;--muted:rgba(255,255,255,0.5);--faint:rgba(255,255,255,0.25);}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
    nav{display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:68px;background:#1E90FF;}
    .nav-logo{display:flex;align-items:center;text-decoration:none;}
    .nav-logo img{height:120px;width:auto;mix-blend-mode:screen;filter:brightness(10);}
    .nav-right{display:flex;align-items:center;gap:12px;}
    .nav-link{color:rgba(255,255,255,0.85);text-decoration:none;font-size:14px;}
    .nav-link:hover{color:#fff;}
    .btn-logout{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.25);color:#fff;padding:8px 16px;border-radius:8px;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;}

    .wrap{max-width:640px;margin:0 auto;padding:40px 32px 80px;}

    /* AVATAR */
    .profile-hero{text-align:center;margin-bottom:40px;}
    .avatar{width:80px;height:80px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:32px;font-weight:800;color:#fff;margin:0 auto 16px;}
    .profile-name{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;letter-spacing:-0.5px;margin-bottom:4px;}
    .profile-email{font-size:14px;color:var(--muted);}
    .member-badge{display:inline-block;background:rgba(30,144,255,0.12);border:1px solid rgba(30,144,255,0.3);color:var(--blue);font-size:12px;padding:4px 12px;border-radius:100px;margin-top:10px;}

    /* STATS */
    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:32px;}
    .stat{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;text-align:center;}
    .stat-val{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:var(--blue);}
    .stat-lbl{font-size:12px;color:var(--muted);margin-top:4px;}

    /* SECTIONS */
    .section{margin-bottom:28px;}
    .section-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;margin-bottom:14px;}
    .menu-item{display:flex;align-items:center;gap:14px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 18px;cursor:pointer;transition:all 0.15s;text-decoration:none;color:var(--text);margin-bottom:8px;}
    .menu-item:hover{background:rgba(30,144,255,0.07);border-color:rgba(30,144,255,0.3);}
    .menu-icon{font-size:20px;width:28px;text-align:center;flex-shrink:0;}
    .menu-label{flex:1;font-size:15px;font-weight:500;}
    .menu-arrow{color:var(--faint);font-size:14px;}

    /* DANGER ZONE */
    .danger{background:rgba(239,68,68,0.06);border:1px solid rgba(239,68,68,0.15);border-radius:12px;padding:16px 18px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:all 0.15s;}
    .danger:hover{background:rgba(239,68,68,0.1);}
    .danger-label{flex:1;font-size:15px;font-weight:500;color:#f87171;}

    .spinner{width:36px;height:36px;border:3px solid rgba(30,144,255,0.15);border-top-color:var(--blue);border-radius:50%;animation:spin 0.8s linear infinite;margin:60px auto;}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<nav>
  <a href="/index.html" class="nav-logo"><img src="/irontri_logo.png" alt="irontri" /></a>
  <div class="nav-right">
    <a href="/dashboard.html" class="nav-link">Dashboard</a>
    <button class="btn-logout" onclick="logOut()">Log out</button>
  </div>
</nav>

<div class="wrap">
  <div id="loading"><div class="spinner"></div></div>
  <div id="content" style="display:none;">

    <div class="profile-hero">
      <div class="avatar" id="avatar-initials">D</div>
      <div class="profile-name" id="profile-name">Loading...</div>
      <div class="profile-email" id="profile-email"></div>
      <div class="member-badge">🏅 Founding Member</div>
    </div>

    <div class="stats">
      <div class="stat"><div class="stat-val" id="s-plans">0</div><div class="stat-lbl">Plans built</div></div>
      <div class="stat"><div class="stat-val" id="s-days">0</div><div class="stat-lbl">Days member</div></div>
      <div class="stat"><div class="stat-val">🆓</div><div class="stat-lbl">Free forever</div></div>
    </div>

    <div class="section">
      <div class="section-title">Training</div>
      <a href="/plan.html" class="menu-item">
        <span class="menu-icon">🏊</span>
        <span class="menu-label">Build a new plan</span>
        <span class="menu-arrow">→</span>
      </a>
      <a href="/dashboard.html" class="menu-item">
        <span class="menu-icon">📅</span>
        <span class="menu-label">My training plans</span>
        <span class="menu-arrow">→</span>
      </a>
      <a href="/predict.html" class="menu-item">
        <span class="menu-icon">🏁</span>
        <span class="menu-label">Race time predictor</span>
        <span class="menu-arrow">→</span>
      </a>
    </div>

    <div class="section">
      <div class="section-title">Account</div>
      <div class="menu-item" onclick="changePassword()">
        <span class="menu-icon">🔒</span>
        <span class="menu-label">Change password</span>
        <span class="menu-arrow">→</span>
      </div>
    </div>

    <div class="section">
      <div class="danger" onclick="logOut()">
        <span class="menu-icon">👋</span>
        <span class="danger-label">Log out</span>
      </div>
    </div>

  </div>
</div>

<script>
  const sb = window.supabase.createClient(
    'https://aezfxagplaxlmovqbmfd.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFlemZ4YWdwbGF4bG1vdnFibWZkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NjY2MzQsImV4cCI6MjA5MDA0MjYzNH0.jPyE36x0jEoX3qsCFBMpMewwmbUI0gRkAtj4EREpMSU'
  );

  async function init() {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { window.location.href = '/auth.html'; return; }

    const user = session.user;
    const name = user.user_metadata?.full_name || user.email.split('@')[0];
    const initials = name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0,2);
    const memberDays = Math.floor((new Date() - new Date(user.created_at)) / (1000*60*60*24));

    document.getElementById('avatar-initials').textContent = initials;
    document.getElementById('profile-name').textContent = name;
    document.getElementById('profile-email').textContent = user.email;
    document.getElementById('s-days').textContent = memberDays;

    // Get plan count
    const { data: plans } = await sb.from('plans').select('id').eq('user_id', user.id);
    document.getElementById('s-plans').textContent = plans?.length || 0;

    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';
  }

  async function changePassword() {
    const email = prompt('Enter your email to receive a password reset link:');
    if (!email) return;
    const { error } = await sb.auth.resetPasswordForEmail(email, {
      redirectTo: 'https://www.irontriapp.com/auth.html'
    });
    if (!error) alert('✅ Password reset email sent! Check your inbox.');
    else alert('Error: ' + error.message);
  }

  async function logOut() {
    await sb.auth.signOut();
    window.location.href = '/index.html';
  }

  init();
</script>
</body>
</html>
