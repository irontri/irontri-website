<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>irontri — Connecting Strava...</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{--blue:#1E90FF;--bg:#0a0a0a;--text:#fff;--muted:rgba(255,255,255,0.5);}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;}
    .card{text-align:center;padding:40px;max-width:400px;}
    .spinner{width:48px;height:48px;border:3px solid rgba(30,144,255,0.15);border-top-color:var(--blue);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 24px;}
    @keyframes spin{to{transform:rotate(360deg)}}
    h2{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;margin-bottom:8px;}
    p{font-size:14px;color:var(--muted);}
    .icon{font-size:48px;margin-bottom:16px;}
  </style>
</head>
<body>
<div class="card" id="card">
  <div class="spinner"></div>
  <h2>Connecting Strava...</h2>
  <p>Just a moment while we link your account.</p>
</div>

<script>
const sb = window.supabase.createClient(
  'https://aezfxagplaxlmovqbmfd.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFlemZ4YWdwbGF4bG1vdnFibWZkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NjY2MzQsImV4cCI6MjA5MDA0MjYzNH0.jPyE36x0jEoX3qsCFBMpMewwmbUI0gRkAtj4EREpMSU'
);

async function handleCallback() {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  const error = params.get('error');

  if (error || !code) {
    showError('Strava connection was cancelled.');
    return;
  }

  try {
    // Exchange code for tokens via our serverless function
    const r = await fetch('/api/strava-exchange', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code }),
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || 'Token exchange failed');

    // Get current irontri user
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { window.location.href = 'auth.html'; return; }

    // Save Strava tokens to Supabase users table
    const { error: dbErr } = await sb.from('users').upsert({
      id: session.user.id,
      strava_athlete_id: data.athlete?.id,
      strava_access_token: data.access_token,
      strava_refresh_token: data.refresh_token,
      strava_token_expires_at: data.expires_at,
    }, { onConflict: 'id' });

    if (dbErr) throw new Error(dbErr.message);

    showSuccess(data.athlete?.firstname || 'Athlete');
    setTimeout(() => window.location.href = 'dashboard.html', 2000);
  } catch (e) {
    showError(e.message);
  }
}

function showSuccess(name) {
  document.getElementById('card').innerHTML = `
    <div class="icon">🎉</div>
    <h2>Strava connected!</h2>
    <p>Welcome ${name} — your activities will now sync automatically. Taking you to your dashboard...</p>`;
}

function showError(msg) {
  document.getElementById('card').innerHTML = `
    <div class="icon">❌</div>
    <h2>Connection failed</h2>
    <p>${msg}</p>
    <br><a href="dashboard.html" style="color:#1E90FF;">Back to dashboard</a>`;
}

handleCallback();
</script>
</body>
</html>
