<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>irontri — Reset Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js"></script>
  <style>
    :root{--blue:#1E90FF;--blue-dark:#1478d4;--bg:#0a0a0a;--surface:rgba(255,255,255,0.05);--border:rgba(255,255,255,0.1);--text:#fff;--muted:rgba(255,255,255,0.5);--faint:rgba(255,255,255,0.25);}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}
    nav{display:flex;align-items:center;padding:0 32px;height:68px;background:#1E90FF;}
    .nav-logo{display:flex;align-items:center;text-decoration:none;}
    .nav-logo img{height:120px;width:auto;mix-blend-mode:screen;filter:brightness(10);}
    .wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px;}
    .card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:40px;width:100%;max-width:420px;}
    .title{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;letter-spacing:-1px;margin-bottom:8px;text-align:center;}
    .sub{font-size:14px;color:var(--muted);text-align:center;margin-bottom:32px;}
    .form-group{margin-bottom:16px;}
    .form-label{font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--faint);margin-bottom:6px;display:block;}
    .form-input{width:100%;padding:14px 16px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:#fff;font-size:15px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color 0.2s;}
    .form-input:focus{border-color:var(--blue);}
    .form-input::placeholder{color:var(--faint);}
    .btn{width:100%;padding:15px;background:var(--blue);border:none;border-radius:10px;color:#fff;font-size:15px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background 0.2s;margin-top:8px;}
    .btn:hover{background:var(--blue-dark);}
    .btn:disabled{opacity:0.5;cursor:not-allowed;}
    .msg{text-align:center;font-size:13px;margin-top:16px;padding:12px;border-radius:8px;display:none;}
    .msg.error{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);color:#f87171;}
    .msg.success{background:rgba(74,222,128,0.1);border:1px solid rgba(74,222,128,0.2);color:#4ade80;}
    .invalid{text-align:center;padding:40px 20px;}
    .invalid-icon{font-size:48px;margin-bottom:16px;}
  </style>
</head>
<body>
<nav>
  <a href="/index.html" class="nav-logo"><img src="/irontri_logo.png" alt="irontri" /></a>
</nav>
<div class="wrap">
  <div class="card">

    <!-- Valid reset link -->
    <div id="reset-form">
      <div class="title">Set new password</div>
      <div class="sub">Choose a strong password for your account.</div>
      <div class="form-group">
        <label class="form-label">New password</label>
        <input type="password" class="form-input" id="new-password" placeholder="At least 6 characters" />
      </div>
      <div class="form-group">
        <label class="form-label">Confirm password</label>
        <input type="password" class="form-input" id="confirm-password" placeholder="Same password again" />
      </div>
      <button class="btn" id="btn-reset" onclick="doReset()">Update password →</button>
      <div class="msg" id="msg-reset"></div>
    </div>

    <!-- Invalid / expired link -->
    <div id="invalid-link" style="display:none;">
      <div class="invalid">
        <div class="invalid-icon">⚠️</div>
        <div style="font-family:'Syne',sans-serif;font-size:20px;font-weight:800;margin-bottom:8px;">Link expired</div>
        <div style="font-size:14px;color:var(--muted);margin-bottom:24px;">This reset link has expired or already been used.</div>
        <a href="/auth.html" style="display:inline-block;background:var(--blue);color:#fff;padding:13px 28px;border-radius:10px;font-size:14px;font-weight:600;text-decoration:none;">Back to login</a>
      </div>
    </div>

  </div>
</div>
<script>
const _url = 'https://aezfxagplaxlmovqbmfd.supabase.co';
const _key = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFlemZ4YWdwbGF4bG1vdnFibWZkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NjY2MzQsImV4cCI6MjA5MDA0MjYzNH0.jPyE36x0jEoX3qsCFBMpMewwmbUI0gRkAtj4EREpMSU';
const _sb = window.supabase.createClient(_url, _key);

// Supabase puts the token in the URL hash - check for it
_sb.auth.onAuthStateChange((event, session) => {
  if (event === 'PASSWORD_RECOVERY') {
    // Valid reset link - show form
    document.getElementById('reset-form').style.display = 'block';
    document.getElementById('invalid-link').style.display = 'none';
  }
});

// If no hash token, show invalid
window.addEventListener('load', () => {
  const hash = window.location.hash;
  if (!hash || !hash.includes('access_token')) {
    document.getElementById('reset-form').style.display = 'none';
    document.getElementById('invalid-link').style.display = 'block';
  }
});

async function doReset() {
  const newPass = document.getElementById('new-password').value;
  const confirmPass = document.getElementById('confirm-password').value;
  const btn = document.getElementById('btn-reset');

  if (!newPass || !confirmPass) return showMsg('Please fill in both fields', 'error');
  if (newPass.length < 6) return showMsg('Password must be at least 6 characters', 'error');
  if (newPass !== confirmPass) return showMsg('Passwords do not match', 'error');

  btn.disabled = true;
  btn.textContent = 'Updating...';

  const { error } = await _sb.auth.updateUser({ password: newPass });
  if (error) {
    showMsg(error.message, 'error');
    btn.disabled = false;
    btn.textContent = 'Update password →';
    return;
  }

  showMsg('✅ Password updated! Redirecting to dashboard...', 'success');
  btn.style.display = 'none';
  setTimeout(() => window.location.href = '/dashboard.html', 2000);
}

function showMsg(msg, type) {
  const el = document.getElementById('msg-reset');
  el.textContent = msg;
  el.className = 'msg ' + type;
  el.style.display = 'block';
}
</script>
</body>
</html>
